<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Vôlei Escolar - Acompanhamento</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; color: #333; padding: 20px; transition: 0.3s; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }

        .nav-esportes { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .btn-nav { text-decoration: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; border: 2px solid transparent; transition: 0.3s; opacity: 0.7; }
        .btn-nav:hover, .btn-nav.ativo { opacity: 1; }
        
        .btn-futebol { background: white; color: #27ae60; border-color: #27ae60; }
        .btn-volei { background: #e67e22; color: white; border-bottom: 3px solid #d35400; }
        .btn-tabela { background: white; color: #3498db; border-color: #3498db; }

        .seletor-periodo { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; background: #e67e22; padding: 15px; border-radius: 8px; color: white; font-weight: bold; }

        h1, h2 { text-align: center; color: #d35400; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
        th, td { border: 1px solid #e0e0e0; padding: 8px; text-align: center; }
        th { background-color: #e67e22; color: white; }

        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); display: flex; justify-content: center; align-items: center; z-index: 1000; flex-direction: column; }

        body.modo-noite { background: #1a1a1a; color: #eee; }
        body.modo-noite .container { background: #2d2d2d; color: #eee; }
        body.modo-noite h1 { color: #e67e22; }
        body.modo-noite table { background: #333; color: #eee; }
        body.modo-noite th { background-color: #d35400; }
        body.modo-noite .loading-overlay { background: rgba(0,0,0,0.95); color: white; }
    </style>
</head>
<body>

<div id="loading" class="loading-overlay">
    <div style="font-size: 40px;">🏐</div>
    <h3>Atualizando dados...</h3>
</div>

<nav class="nav-esportes">
    <a href="index.html" class="btn-nav btn-futebol">⚽ Futebol</a>
    <a href="#" class="btn-nav btn-volei ativo">🏐 Vôlei</a>
    <a href="publico_tabela.html" class="btn-nav btn-tabela">📅 Tabela</a>
</nav>

<div class="seletor-periodo">
    <label><input type="radio" name="periodo" value="tarde" checked onclick="trocarPeriodo('tarde')"> ☀️ TARDE</label>
    <label><input type="radio" name="periodo" value="noite" onclick="trocarPeriodo('noite')"> 🌙 NOITE</label>
</div>

<div class="container">
    <h1 id="tituloGeral">🏐 Classificação - Tarde</h1>

    <table id="tabela">
        <thead>
            <tr><th>Pos</th><th>Clube</th><th>Pts</th><th>J</th><th>V</th><th>D</th><th>Sets G</th><th>Sets P</th><th>Pts F</th><th>Pts S</th></tr>
        </thead>
        <tbody id="corpoTabela"></tbody>
    </table>

    <div style="margin-top: 30px;">
        <h3>📝 Últimos Resultados</h3>
        <ul id="historicoPartidas" style="list-style: none; padding: 0;"></ul>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwhEjRiFRCWDbgiSmVAIfr42yBUsJiGLgpRY2yPIorbwp238MfTTfOeFLXNHJsZzOB-_w/exec";
    let bancos = { tarde: {}, noite: {} };
    let periodoAtual = 'tarde';

    window.onload = async function() {
        await carregarDados();
        trocarPeriodo('tarde');
    };

    async function carregarDados() {
        try {
            const response = await fetch(API_URL);
            const dados = await response.json();
            if (dados['volei_tarde']) bancos.tarde = dados['volei_tarde'];
            if (dados['volei_noite']) bancos.noite = dados['volei_noite'];
        } catch (e) { console.error("Erro rede", e); }
        document.getElementById('loading').style.display = 'none';
    }

    function trocarPeriodo(p) {
        periodoAtual = p;
        document.body.className = p === 'noite' ? 'modo-noite' : '';
        document.getElementById('tituloGeral').textContent = `🏐 Classificação - ${p.charAt(0).toUpperCase() + p.slice(1)}`;
        renderizar();
    }

    function renderizar() {
        const dados = bancos[periodoAtual];
        if(!dados || !dados.times) return;

        const ord = [...dados.times].sort((a, b) => {
            if (b.pts !== a.pts) return b.pts - a.pts;
            if (b.v !== a.v) return b.v - a.v;
            let saldoA = a.setsG - a.setsP;
            let saldoB = b.setsG - b.setsP;
            if (saldoB !== saldoA) return saldoB - saldoA;
            return b.pf - a.pf;
        });

        document.getElementById('corpoTabela').innerHTML = ord.map((t, i) => {
            let style = i === 0 ? "style='background-color: rgba(255, 215, 0, 0.2)'" : "";
            return `<tr ${style}>
                <td><strong>${i + 1}º</strong></td><td style="text-align:left; padding-left:15px;">${t.nome}</td>
                <td style="font-weight:bold;">${t.pts}</td><td>${t.j}</td><td style="color:green">${t.v}</td><td style="color:red">${t.d}</td>
                <td>${t.setsG}</td><td>${t.setsP}</td><td>${t.pf}</td><td>${t.ps}</td>
            </tr>`;
        }).join('');

        document.getElementById('historicoPartidas').innerHTML = [...dados.historico].reverse().map(h => 
            `<li style="padding: 10px; border-bottom: 1px solid #eee;">${h}</li>`
        ).join('');
    }
</script>
</body>
</html>
