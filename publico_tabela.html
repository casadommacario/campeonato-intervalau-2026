<!DOCTYPE html>
<html lang="pt-br">
<head>
 <meta charset="UTF-8">
 <title>Cronograma de Jogos</title>
 <style>
 body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
background: #f0f2f5; color: #333; padding: 20px; transition: 0.3s; }
 .container { max-width: 900px; margin: auto; background: white; padding:
25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
 .nav-esportes { display: flex; justify-content: center; gap: 15px; 
margin-bottom: 20px; flex-wrap: wrap; }
 .btn-nav { text-decoration: none; padding: 10px 20px; border-radius: 
8px; font-weight: bold; border: 2px solid transparent; transition: 0.3s; 
opacity: 0.7; }
 .btn-nav:hover, .btn-nav.ativo { opacity: 1; }
 .btn-futebol { background: white; color: #27ae60; border-color: #27ae60;}
 .btn-volei { background: white; color: #e67e22; border-color: #e67e22; }
 .btn-tabela { background: #3498db; color: white; border-bottom: 3px 
solid #2980b9; }
 .seletor-periodo { display: flex; justify-content: center; gap: 20px; 
margin-bottom: 20px; background: #34495e; padding: 15px; border-radius: 8px; 
color: white; font-weight: bold; }
 .lista-jogos { list-style: none; padding: 0; }
 .card-jogo { display: flex; justify-content: space-between; align-items:
center; background: white; padding: 15px; margin-bottom: 10px; border-radius: 
8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 6px solid #ccc; }
 
 .futebol { border-left-color: #27ae60; }
 .volei { border-left-color: #e67e22; }
 .info-jogo { display: flex; align-items: center; gap: 15px; font-size: 
16px; font-weight: bold; width: 100%; justify-content: center; flex-wrap: wrap; }
 .horario-badge { background: #eee; padding: 5px 10px; border-radius: 
4px; font-size: 12px; color: #555; margin-right: 15px; display: flex; align-items: center; gap: 5px; }
 .vs { color: #999; font-size: 14px; margin: 0 10px; }
 .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; 
height: 100%; background: rgba(255,255,255,0.95); display: flex; 
justify-content: center; align-items: center; z-index: 1000; flex-direction: 
column; }
 body.modo-noite { background: #1a1a1a; color: #eee; }
 body.modo-noite .container { background: #2d2d2d; color: #eee; }
 body.modo-noite .card-jogo { background: #3d3d3d; color: #eee; }
 body.modo-noite .loading-overlay { background: rgba(0,0,0,0.95); color: 
white; }
 </style>
</head>
<body>

<div id="loading" class="loading-overlay">
 <div style="font-size: 40px;">⏳</div>   
 <h3>Buscando jogos...</h3>
</div>

<nav class="nav-esportes">
 <a href="index.html" class="btn-nav btn-futebol">⚽ Futebol</a> 
 <a href="publico_volei.html" class="btn-nav btn-volei">🏐 Vôlei</a>   
 <a href="#" class="btn-nav btn-tabela ativo">📅 Tabela</a>   
</nav>

<div class="seletor-periodo">
 <label><input type="radio" name="periodo" value="tarde" checked 
onclick="trocarPeriodo('tarde')"> ☀ TARDE</label> 
 <label><input type="radio" name="periodo" value="noite" 
onclick="trocarPeriodo('noite')"> 🌙 NOITE</label>   
</div>

<div class="container">
 <h1 id="tituloPagina" style="text-align: center; color: #3498db;">📅 Cronograma - Tarde</h1>
 <div id="msgVazio" style="text-align: center; color: #999; margin-top: 20px;">Nenhum jogo agendado.</div>
 <ul id="listaJogos" class="lista-jogos"></ul>
</div>

<script>
 const API_URL = "https://script.google.com/macros/s/AKfycbwhEjRiFRCWDbgiSmVAIfr42yBUsJiGLgpRY2yPIorbwp238MfTTfOeFLXNHJsZzOB-_w/exec";
 
 let agendamentos = { tarde: [], noite: [] };
 let periodoAtual = 'tarde';
 
 window.onload = async function() {
    await carregarDados();
    trocarPeriodo('tarde');
 };
 
 async function carregarDados() {
    try {
        const response = await fetch(API_URL);
        const dados = await response.json();
        
        if (dados['cronograma_tarde']) agendamentos.tarde = dados['cronograma_tarde'];
        if (dados['cronograma_noite']) agendamentos.noite = dados['cronograma_noite'];
    } catch (e) { 
        console.error("Erro rede", e); 
    }
    document.getElementById('loading').style.display = 'none';
 }
 
 function trocarPeriodo(p) {
    periodoAtual = p;
    document.body.className = p === 'noite' ? 'modo-noite' : '';
    document.getElementById('tituloPagina').textContent = `📅 Cronograma - ${p.charAt(0).toUpperCase() + p.slice(1)}`;
    renderizar();
 }
 
 function renderizar() {
    const lista = document.getElementById('listaJogos');
    const msg = document.getElementById('msgVazio');
    const jogos = agendamentos[periodoAtual] || [];
    
    lista.innerHTML = "";
    msg.style.display = jogos.length === 0 ? 'block' : 'none';
    
    // Ordenar primeiro por DATA e depois por HORÁRIO
    jogos.sort((a, b) => {
        let dataA = a.data || "9999-99-99"; // Para manter compatibilidade se houver dados antigos sem data
        let dataB = b.data || "9999-99-99";
        
        if (dataA === dataB) {
            return a.horario.localeCompare(b.horario);
        }
        return dataA.localeCompare(dataB);
    });
    
    jogos.forEach(jogo => {
        const icone = jogo.esporte === 'futebol' ? '⚽' : '🏐'; 
        
        // Formatando a data de AAAA-MM-DD para DD/MM
        let dataFormatada = "";
        if(jogo.data) {
            let partesData = jogo.data.split('-');
            if(partesData.length === 3) {
                dataFormatada = `${partesData[2]}/${partesData[1]} às `;
            }
        }

        lista.innerHTML += `
        <li class="card-jogo ${jogo.esporte}">
            <div class="info-jogo">
                <span class="horario-badge">${icone} ${dataFormatada}${jogo.horario}</span>
                <span>${jogo.timeA}</span>
                <span class="vs">vs</span>
                <span>${jogo.timeB}</span>
            </div>
        </li>
        `;
    });
 }
</script>
</body>
</html>
