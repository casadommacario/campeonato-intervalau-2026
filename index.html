<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Campeonato Escolar - Acompanhamento</title>
    <style>
        /* ESTILOS (Apenas Visualização) */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; color: #333; padding: 20px; transition: 0.3s; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }

        /* MENU */
        .nav-esportes { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .btn-nav { text-decoration: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; border: 2px solid transparent; transition: 0.3s; opacity: 0.7; }
        .btn-nav:hover { opacity: 1; }
        .btn-nav.ativo { opacity: 1; border-bottom: 3px solid #333; }

        .btn-futebol { background: #27ae60; color: white; }
        .btn-volei { background: #fff; color: #e67e22; border-color: #e67e22; }
        .btn-tabela { background: #fff; color: #3498db; border-color: #3498db; }

        /* SELETOR */
        .seletor-periodo { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; background: #2980b9; padding: 15px; border-radius: 8px; color: white; font-weight: bold; }

        /* TABELAS E CARDS */
        h1, h2, h3 { text-align: center; color: #1a3a5a; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
        th, td { border: 1px solid #e0e0e0; padding: 10px; text-align: center; }
        th { background-color: #2980b9; color: white; }
        
        .estatisticas { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-top: 30px; }
        .card-estat { background: #fff; border: 1px solid #ddd; padding: 15px; border-radius: 8px; height: 350px; overflow-y: auto; }

        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); display: flex; justify-content: center; align-items: center; z-index: 1000; flex-direction: column; }

        /* MODO NOITE */
        body.modo-noite { background: #1a1a1a; color: #eee; }
        body.modo-noite .container { background: #2d2d2d; color: #eee; }
        body.modo-noite h1 { color: #5dade2; }
        body.modo-noite table { background: #333; color: #eee; }
        body.modo-noite th { background-color: #1a3a5a; }
        body.modo-noite .card-estat { background: #3d3d3d; border-color: #555; }
        body.modo-noite .loading-overlay { background: rgba(0,0,0,0.95); color: white; }
    </style>
</head>
<body>

<div id="loading" class="loading-overlay">
    <div style="font-size: 40px;">⚽</div>
    <h3>Atualizando dados...</h3>
</div>

<nav class="nav-esportes">
    <a href="#" class="btn-nav btn-futebol ativo">⚽ Futebol</a>
    <a href="publico_volei.html" class="btn-nav btn-volei">🏐 Vôlei</a>
    <a href="publico_tabela.html" class="btn-nav btn-tabela">📅 Tabela</a>
</nav>

<div class="seletor-periodo">
    <label><input type="radio" name="periodo" value="tarde" checked onclick="trocarPeriodo('tarde')"> ☀️ TARDE</label>
    <label><input type="radio" name="periodo" value="noite" onclick="trocarPeriodo('noite')"> 🌙 NOITE</label>
</div>

<div class="container">
    <h1 id="tituloGeral">🏆 Classificação - Tarde</h1>

    <h2>Tabela de Classificação</h2>
    <table id="tabela">
        <thead>
            <tr><th>Seleção</th><th>P</th><th>J</th><th>V</th><th>E</th><th>D</th><th>GP</th><th>GC</th><th>SG</th></tr>
        </thead>
        <tbody id="corpoTabela"></tbody>
    </table>

    <div class="estatisticas">
        <div class="card-estat"><h3>📝 Últimos Jogos</h3><ul id="listaOcorrencias"></ul></div>
        <div class="card-estat"><h3>⚽ Artilharia</h3><ul id="listaArtilharia"></ul></div>
        <div class="card-estat"><h3>⭐ Craques (MVP)</h3><ul id="listaMVP"></ul></div>
        <div class="card-estat"><h3>🟨🟥 Cartões</h3><ul id="listaCartoes"></ul></div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwhEjRiFRCWDbgiSmVAIfr42yBUsJiGLgpRY2yPIorbwp238MfTTfOeFLXNHJsZzOB-_w/exec";

    let bancos = { tarde: {}, noite: {} };
    let periodoAtual = 'tarde';

    window.onload = async function() {
        await carregarDados();
        trocarPeriodo('tarde');
    };

    async function carregarDados() {
        try {
            const response = await fetch(API_URL);
            const dados = await response.json();
            if (dados['futebol_tarde']) bancos.tarde = dados['futebol_tarde'];
            if (dados['futebol_noite']) bancos.noite = dados['futebol_noite'];
        } catch (e) { console.error("Erro rede", e); }
        document.getElementById('loading').style.display = 'none';
    }

    function trocarPeriodo(p) {
        periodoAtual = p;
        document.body.className = p === 'noite' ? 'modo-noite' : '';
        document.getElementById('tituloGeral').textContent = `🏆 Classificação - ${p.charAt(0).toUpperCase() + p.slice(1)}`;
        renderizar();
    }

    function renderizar() {
        const dados = bancos[periodoAtual];
        if(!dados || !dados.selecoes) return;

        // Tabela
        const ord = [...dados.selecoes].sort((a, b) => b.p - a.p || b.sg - a.sg);
        document.getElementById('corpoTabela').innerHTML = ord.map(s => `
            <tr><td><strong>${s.nome}</strong></td><td>${s.p}</td><td>${s.j}</td><td>${s.v}</td><td>${s.e}</td><td>${s.d}</td>
            <td>${s.gp}</td><td>${s.gc}</td><td>${s.sg}</td></tr>
        `).join('');

        // Listas
        const criarLista = (obj, icone) => Object.entries(obj).sort((a,b)=>b[1]-a[1]).map(i=>`<li>${i[1]}${icone} ${i[0]}</li>`).join('');
        
        document.getElementById('listaArtilharia').innerHTML = criarLista(dados.eventos.artilharia, '⚽');
        document.getElementById('listaMVP').innerHTML = criarLista(dados.eventos.mvp, '⭐');
        document.getElementById('listaCartoes').innerHTML = dados.eventos.cartoes.map(c=>`<li>${c}</li>`).join('');
        document.getElementById('listaOcorrencias').innerHTML = [...dados.eventos.ocorrencias].reverse().map(o=>`<li style="margin-bottom:8px; border-bottom:1px solid #eee; padding-bottom:5px;">${o}</li>`).join('');
    }
</script>
</body>
</html>
