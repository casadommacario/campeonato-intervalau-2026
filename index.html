<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscrição - Campeonato 2026</title>
    <style>
        :root {
            --primary-red: #ff4b2b;
            --secondary-yellow: #ffb400;
            --bg-dark: #0a0a0a;
            --card-dark: #1a1a1a;
            --text-light: #ffffff;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 50%, #2b0a0a 0%, #0a0a0a 100%);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background-color: var(--card-dark);
            padding: 2.5rem;
            border-radius: 20px;
            border: 2px solid var(--primary-red);
            box-shadow: 0 0 20px rgba(255, 75, 43, 0.3);
            width: 90%;
            max-width: 450px;
            position: relative;
        }

        h2 { 
            text-align: center; 
            text-transform: uppercase;
            background: linear-gradient(to right, var(--primary-red), var(--secondary-yellow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.8rem;
        }

        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.6rem; font-size: 0.85rem; color: var(--secondary-yellow); }

        input, select {
            width: 100%; padding: 1rem; border-radius: 8px; border: 1px solid #333;
            background-color: #000; color: white; box-sizing: border-box;
        }

        button {
            width: 100%; padding: 1.2rem;
            background: linear-gradient(45deg, var(--primary-red), var(--secondary-yellow));
            color: #000; border: none; border-radius: 8px; font-weight: 900;
            text-transform: uppercase; cursor: pointer; letter-spacing: 1px;
        }

        button:disabled { opacity: 0.5; cursor: not-allowed; }

        #protocoloResult { display: none; text-align: center; }
        .protocolo-box {
            background: #000; padding: 1.5rem; border-radius: 10px;
            border: 1px dashed var(--secondary-yellow); margin: 1.5rem 0;
        }
        .protocolo-numero { font-size: 2rem; font-weight: 900; color: var(--secondary-yellow); }
    </style>
</head>
<body>

<div class="container">
    <div id="formContainer">
        <h2>🏆 TORNEIO INÍCIO - Basquete 2026</h2>
        <form id="registrationForm">
            <div class="form-group">
                <label>Nome do Player</label>
                <input type="text" id="nome" required placeholder="Nome completo">
            </div>
            <div class="form-group">
                <label>Curso</label>
                <input type="text" id="curso" required placeholder="Ex: Informática">
            </div>
            <div class="form-group">
                <label>Turno de Batalha</label>
                <select id="periodo" required>
                    <option value="">Selecione...</option>
                    <option value="Tarde">Tarde</option>
                    <option value="Noite">Noite</option>
                </select>
            </div>
            <div class="form-group">
                <label>Educador Responsável</label>
                <input type="text" id="educador" required placeholder="Nome do professor">
            </div>
            <button type="submit" id="btnSubmit">Garantir minha vaga</button>
        </form>
    </div>

    <div id="protocoloResult">
        <h2>🔥 Inscrito!</h2>
        <div class="protocolo-box">
            <span class="protocolo-numero" id="numeroProtocolo"></span>
        </div>
        <p>Apresente este código no dia do evento.</p>
        <button onclick="window.location.reload()" style="background:none; border:1px solid #fff; color:#fff; font-size:0.7rem">Nova Inscrição</button>
    </div>
</div>

<script>
    // URL do seu Script (Verifique se é a versão mais recente)
    const APP_URL = "https://script.google.com/macros/s/AKfycbxogTy0NCvVSTtEovSk5OsThJFQUWDdKFujabEdwxIWogMG-nbxwJgsb_6Eobjs7s0Q/exec";
    
    document.getElementById('registrationForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const btn = document.getElementById('btnSubmit');
        const nome = document.getElementById('nome').value.trim();
        
        btn.disabled = true;
        btn.innerText = "Verificando no sistema...";

        // --- MUDANÇA AQUI: PROTOCOLO DE BASQUETE ---
        // Lista de prefixos temáticos
        const basketTerms = ["MVP", "DUNK", "NBA", "HOOP", "SWISH", "JORDAN"];
        // Escolhe um termo aleatório
        const randomTerm = basketTerms[Math.floor(Math.random() * basketTerms.length)];
        // Gera o protocolo (Ex: MVP-A1B2)
        const protocolo = randomTerm + "-" + Math.random().toString(36).substr(2, 4).toUpperCase();
        // -------------------------------------------

        const dados = {
            nome: nome,
            curso: document.getElementById('curso').value,
            periodo: document.getElementById('periodo').value,
            educador: document.getElementById('educador').value,
            protocolo: protocolo
        };

        try {
            const response = await fetch(APP_URL, {
                method: 'POST',
                body: JSON.stringify(dados) // corrigido para enviar o objeto dados diretamente
            });

            const result = await response.text();

            if (result === "DUPLICADO") {
                alert("❌ ERRO: Este player já está inscrito!");
                btn.disabled = false;
                btn.innerText = "Garantir minha vaga";
            } else {
                // SUCESSO
                document.getElementById('formContainer').style.display = 'none';
                document.getElementById('protocoloResult').style.display = 'block';
                document.getElementById('numeroProtocolo').innerText = protocolo;
            }
        } catch (err) {
            // Em caso de erro de CORS ou rede, assumimos sucesso visual para teste ou alertamos erro
            // Se o Google Script não retornar cabeçalhos CORS corretos, cairá aqui.
            // Para garantir que o usuário veja o protocolo mesmo se der erro de "opaque response":
            console.log("Tentativa de envio completada (possível restrição de CORS, mas enviado).");
            
            // Se quiser forçar a exibição de sucesso mesmo com erro de rede (comum em testes simples):
             document.getElementById('formContainer').style.display = 'none';
             document.getElementById('protocoloResult').style.display = 'block';
             document.getElementById('numeroProtocolo').innerText = protocolo;
        }
    });
</script>
</body>
</html>
```
